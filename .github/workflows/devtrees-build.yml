name: DevTrees Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent two pushes from racing to publish the same release.
concurrency:
  group: devtrees-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-version:
    name: Check version bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need full tag history so we can compare against previously released versions.
          fetch-depth: 0

      - name: Determine version and whether to release
        id: check
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Current package.json version: ${version}"

          # Release only when the current version has higher semver precedence
          # than every existing v* release tag. Uses a full semver comparison
          # (prerelease-aware) so suffixes like 1.2.0-beta.1 are ordered
          # correctly, unlike `sort -V`.
          should_release="$(git tag --list 'v*' | node ./.github/scripts/semver-check.js "${version}")"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

  build-and-release:
    name: Build and release (Windows)
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack (pins yarn from packageManager field)
        shell: bash
        # Must run BEFORE setup-node's cache step so the `yarn` shim resolves.
        # COREPACK_ENABLE_DOWNLOAD_PROMPT=0 prevents the interactive prompt
        # Node 22's corepack shows the first time it downloads yarn 1.22.22.
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      # windows-latest ships a stable Rust toolchain; just make sure it is current.
      - name: Update Rust toolchain
        shell: bash
        run: rustup update stable && rustup default stable

      # Cache Cargo registry + the src-tauri build dir to keep release builds fast.
      # actions/cache is GitHub-owned, so it satisfies the enterprise actions policy.
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        shell: bash
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: yarn install --frozen-lockfile

      - name: Verify version consistency
        shell: bash
        # The updater manifest version comes from package.json, but the installed
        # app version comes from src-tauri/tauri.conf.json. If they drift, the
        # updater can loop (manifest says vN+1, installer still contains vN).
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          if [ "$VERSION" != "$tauri_version" ]; then
            echo "::error::Version mismatch: package.json=${VERSION} vs tauri.conf.json=${tauri_version}. Bump both." >&2
            exit 1
          fi
          echo "Versions match: ${VERSION}"

      - name: Build and sign Tauri installer
        shell: bash
        # The updater requires signed artifacts. Provide the minisign private key
        # (and its password) via repository secrets; Tauri writes a `.sig` next to
        # the NSIS installer when `createUpdaterArtifacts` is enabled. Clean the
        # bundle dir first so a restored Cargo cache can never surface a stale
        # installer/signature from a previous version.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          rm -rf src-tauri/target/release/bundle/nsis
          yarn tauri build

      - name: Assemble release artifacts and updater manifest
        shell: bash
        env:
          TAG: ${{ needs.check-version.outputs.tag }}
          VERSION: ${{ needs.check-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          bundle_dir="src-tauri/target/release/bundle/nsis"

          # Select the exact artifacts for this version so a wrong installer/sig
          # pair can never be uploaded.
          installer_name="DevTrees_${VERSION}_x64-setup.exe"
          installer="${bundle_dir}/${installer_name}"
          signature_file="${installer}.sig"

          if [ ! -f "$installer" ]; then
            echo "::error::Expected installer not found: ${installer}" >&2
            ls -la "$bundle_dir" >&2 || true
            exit 1
          fi
          if [ ! -f "$signature_file" ]; then
            echo "::error::Expected signature not found: ${signature_file} — is signing configured (TAURI_SIGNING_PRIVATE_KEY)?" >&2
            ls -la "$bundle_dir" >&2 || true
            exit 1
          fi

          # Stage assets under a flat dir for the release upload.
          mkdir -p dist-release
          cp "$installer" "dist-release/${installer_name}"
          cp "$signature_file" "dist-release/${installer_name}.sig"

          # Build the Tauri updater manifest that `plugins.updater.endpoints`
          # points at (releases/latest/download/latest.json). The signature field
          # is the *contents* of the .sig file, and the url points at the asset
          # that will be uploaded to this release.
          export SIGNATURE="$(cat "$signature_file")"
          export DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${installer_name}"
          node -e '
            const fs = require("fs");
            const manifest = {
              version: process.env.VERSION,
              notes: `DevTrees ${process.env.VERSION}`,
              pub_date: new Date().toISOString(),
              platforms: {
                "windows-x86_64": {
                  signature: process.env.SIGNATURE,
                  url: process.env.DOWNLOAD_URL
                }
              }
            };
            fs.writeFileSync("dist-release/latest.json", JSON.stringify(manifest, null, 2));
          '

      - name: Publish GitHub Release
        # Uses the pre-installed `gh` CLI instead of a third-party action so the
        # enterprise policy "all actions must be from a repository owned by your
        # enterprise, created by GitHub, or verified in the GitHub Marketplace"
        # is satisfied. The release must stay "latest" so the updater endpoint
        # (releases/latest/download/latest.json) resolves correctly.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check-version.outputs.tag }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          if [ ! -f dist-release/latest.json ]; then
            echo "::error::Missing dist-release/latest.json updater manifest" >&2
            ls -la dist-release >&2 || true
            exit 1
          fi

          gh release create "$TAG" \
            --title "DevTrees $VERSION" \
            --target "$GITHUB_SHA" \
            --latest \
            dist-release/*-setup.exe \
            dist-release/*-setup.exe.sig \
            dist-release/latest.json
